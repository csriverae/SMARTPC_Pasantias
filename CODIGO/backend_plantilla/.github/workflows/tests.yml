name: Tests, Coverage & Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r starter-kit/starter-kit/requirements-dev.txt
    
    - name: Run Unit Tests
      run: |
        cd starter-kit/starter-kit
        pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
    
    - name: Run Integration Tests
      run: |
        cd starter-kit/starter-kit
        pytest tests/integration/ -v
    
    - name: Run Security Tests
      run: |
        cd starter-kit/starter-kit
        pytest tests/security/ -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./starter-kit/starter-kit/coverage.xml
        flags: unittests
        fail_ci_if_error: false
        verbose: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pylint

    - name: Run Bandit Security Scan
      run: |
        cd starter-kit/starter-kit
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/ -ll -v
    
    - name: Check for vulnerable dependencies
      run: |
        cd starter-kit/starter-kit
        safety check --json > safety-report.json || true
        safety check
    
    - name: Upload Bandit Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: starter-kit/starter-kit/bandit-report.json
    
    - name: Upload Safety Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: safety-report
        path: starter-kit/starter-kit/safety-report.json

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r starter-kit/starter-kit/requirements-dev.txt
    
    - name: Generate coverage report
      run: |
        cd starter-kit/starter-kit
        pytest tests/ --cov=app --cov-report=xml
    
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectBaseDir=./starter-kit/starter-kit
          -Dsonar.sources=app
          -Dsonar.python.coverage.reportPaths=coverage.xml
