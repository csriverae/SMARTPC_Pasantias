[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=3
    --cov=app
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing
    --cov-branch
    --cov-fail-under=70

markers =
    unit: Unit tests (deselect with '-m "not unit"')
    integration: Integration tests
    security: Security tests
    slow: Slow running tests
    smoke: Smoke tests

# Coverage configuration
[coverage:run]
source = app
omit = 
    */__init__.py
    */migrations/*
    app/main.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
