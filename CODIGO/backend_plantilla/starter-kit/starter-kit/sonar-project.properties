# SonarQube Configuration for MesaPass Backend
sonar.projectKey=mesapass-backend
sonar.projectName=MesaPass Backend
sonar.projectVersion=1.0

# Directory setup
sonar.sources=app
sonar.tests=tests
sonar.exclusions=**/migrations/**,**/node_modules/**,.venv/**

# Python specific settings
sonar.language=py
sonar.python.version=3.11

# Coverage settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/tests/**,**/migrations/**,**/node_modules/**

# Unit test detection
sonar.python.unittest.canSkipDefault=true

# Security key
sonar.organization=mesapass

# Debug log level (optional)
sonar.log.level=DEBUG

# Use legacy code scanner (if needed)
sonar.python.pylint.reportPath=pylint-report.txt

# Sonar scanner timeout
sonar.ws.timeout=300

# C3 Python plugin specific
sonar.python.pylint_config=.pylintrc

# Additional includes for common patterns
sonar.inclusions=**/*.py
